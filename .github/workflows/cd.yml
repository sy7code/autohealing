# ──────────────────────────────────────────────────────────────
# CD 워크플로우 - Azure App Service 자동 배포
#
# 트리거:
#   - main 브랜치 push (develop → main PR Merge 시)
#   - 수동 실행 (workflow_dispatch)
#
# 배포 대상:
#   - Azure App Service (Spring Boot JAR)
#   - Spring Profile: prod (application-prod.yml 활성화)
#
# 필요한 GitHub Secrets:
#   - AZURE_WEBAPP_PUBLISH_PROFILE  : Azure App Service 퍼블리시 프로파일 XML
#   - AZURE_WEBAPP_NAME             : App Service 이름 (예: autohealing-backend)
#   - DB_URL                        : Supabase PostgreSQL JDBC URL
#   - DB_USERNAME                   : DB 사용자명
#   - DB_PASSWORD                   : DB 비밀번호
#   - JIRA_HOST                     : Jira Cloud URL
#   - JIRA_EMAIL                    : Jira 계정 이메일
#   - JIRA_API_TOKEN                : Jira API 토큰
#   - JIRA_PROJECT_KEY              : Jira 프로젝트 키
#   - DISCORD_WEBHOOK_URL           : Discord Webhook URL
#   - GITHUB_TOKEN_PAT              : GitHub Personal Access Token (PR 생성용)
#   - JWT_SECRET                    : JWT 서명 시크릿 (32자 이상)
#   - ADMIN_USERNAME                : 대시보드 관리자 ID
#   - ADMIN_PASSWORD                : 대시보드 관리자 PW
#   - GEMINI_API_KEY                : Gemini AI API 키
#   - SNYK_TOKEN                    : Snyk CLI 인증 토큰
#   - AZURE_SUBSCRIPTION_ID         : Azure 구독 ID
#   - LOCAL_REPO_PATH               : 스캔 대상 로컬 레포 경로 (App Service 기준)
#   - VERCEL_URL                    : 프론트엔드 대시보드 URL
#   - VERCEL_TOKEN                  : Vercel API 토큰
#   - VERCEL_ORG_ID                : Vercel 조직(Team) ID
#   - VERCEL_PROJECT_ID            : Vercel 프로젝트 ID
# ──────────────────────────────────────────────────────────────
name: CD - Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: '수동 배포 사유'
        required: false
        default: '수동 배포 실행'

jobs:
  build:
    name: Build Production JAR
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.jar-name.outputs.name }}

    steps:
      # ── 1. 소스 코드 체크아웃 ─────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. JDK 21 설치 ────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle 캐시 ────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Gradle 실행 권한 부여 ──────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. 프로덕션 JAR 빌드 (테스트 스킵 - CI에서 이미 검증됨) ─
      - name: Build production bootJar
        run: ./gradlew bootJar -x test --no-daemon
        env:
          # 빌드 시점 환경변수 (런타임 값은 App Service에서 주입)
          SPRING_PROFILES_ACTIVE: prod
          JIRA_HOST: https://placeholder.atlassian.net
          JIRA_EMAIL: placeholder@example.com
          JIRA_API_TOKEN: placeholder-token
          JIRA_PROJECT_KEY: SCRUM
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/placeholder
          JWT_SECRET: placeholder-jwt-secret-for-build-only
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: password123
          AZURE_SUBSCRIPTION_ID: placeholder

      # ── 6. JAR 파일명 추출 ────────────────────────────────────
      - name: Extract JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -1)
          echo "name=$(basename $JAR_FILE)" >> $GITHUB_OUTPUT
          echo "JAR 파일: $JAR_FILE"

      # ── 7. JAR 아티팩트 업로드 ────────────────────────────────
      - name: Upload production JAR
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: build/libs/*.jar
          retention-days: 3

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      # ── 1. JAR 아티팩트 다운로드 ──────────────────────────────
      - name: Download production JAR
        uses: actions/download-artifact@v4
        with:
          name: production-jar
          path: ./deploy

      # ── 2. Azure App Service 배포 ─────────────────────────────
      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy/*.jar

      # ── 3. 배포 후 헬스체크 ───────────────────────────────────
      - name: Health check after deployment
        run: |
          echo "배포 완료. 헬스체크 시작 (30초 대기)..."
          sleep 30
          HEALTH_URL="${{ steps.deploy.outputs.webapp-url }}/actuator/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          echo "헬스체크 응답: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ 헬스체크 실패 (status=$HTTP_STATUS). 수동 확인이 필요합니다."
            # 헬스체크 실패 시 경고만 출력 (배포 자체는 성공으로 처리)
          else
            echo "✅ 헬스체크 성공!"
          fi

      # ── 4. 배포 결과 요약 ─────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## 배포 결과 요약" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 앱 | ${{ secrets.AZURE_WEBAPP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 URL | ${{ steps.deploy.outputs.webapp-url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 트리거 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 시각 | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: frontend
