# ──────────────────────────────────────────────────────────────
# CI 워크플로우 - 빌드 및 단위/통합 테스트 자동화
# ──────────────────────────────────────────────────────────────
name: CI - Build & Test

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ── Backend 빌드 및 테스트 ───────────────────────────────────
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build without tests (compile check)
        run: ./gradlew classes --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: https://placeholder.atlassian.net
          JIRA_EMAIL: placeholder@example.com
          JIRA_API_TOKEN: placeholder-token
          JIRA_PROJECT_KEY: SCRUM
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/placeholder
          JWT_SECRET: test-secret-key-that-is-long-enough-for-hmac-256-algorithm
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: password123
          AZURE_SUBSCRIPTION_ID: placeholder-subscription-id

      - name: Run unit tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: https://placeholder.atlassian.net
          JIRA_EMAIL: placeholder@example.com
          JIRA_API_TOKEN: placeholder-token
          JIRA_PROJECT_KEY: SCRUM
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/placeholder
          JWT_SECRET: test-secret-key-that-is-long-enough-for-hmac-256-algorithm
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: password123
          AZURE_SUBSCRIPTION_ID: placeholder-subscription-id
          GEMINI_API_KEY: ""
          SNYK_API_TOKEN: ""
          SNYK_ORG_ID: ""

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: build/reports/tests/test/
          retention-days: 7

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: https://placeholder.atlassian.net
          JIRA_EMAIL: placeholder@example.com
          JIRA_API_TOKEN: placeholder-token
          JIRA_PROJECT_KEY: SCRUM
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/placeholder
          JWT_SECRET: test-secret-key-that-is-long-enough-for-hmac-256-algorithm
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: password123
          AZURE_SUBSCRIPTION_ID: placeholder-subscription-id

      - name: Upload bootJar artifact
        uses: actions/upload-artifact@v4
        with:
          name: autohealing-backend-jar
          path: build/libs/*.jar
          retention-days: 1

  # ── Frontend 빌드 및 린트 ────────────────────────────────────
  frontend-build-lint:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Lint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
