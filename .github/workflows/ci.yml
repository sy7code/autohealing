# ──────────────────────────────────────────────────────────────
# CI 워크플로우 - 빌드 및 단위/통합 테스트 자동화
# ──────────────────────────────────────────────────────────────
name: CI - Build & Test

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ── Backend 빌드 및 테스트 ───────────────────────────────────
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build without tests (compile check)
        run: ./gradlew classes --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JWT_SECRET: "this-is-a-dummy-secret-key-for-testing-purposes-only-12345"
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run unit tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JWT_SECRET: "this-is-a-dummy-secret-key-for-testing-purposes-only-12345"
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SNYK_API_TOKEN: ${{ secrets.SNYK_API_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: build/reports/tests/test/
          retention-days: 7

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: local
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JWT_SECRET: "this-is-a-dummy-secret-key-for-testing-purposes-only-12345"
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload bootJar artifact
        uses: actions/upload-artifact@v4
        with:
          name: autohealing-backend-jar
          path: build/libs/*.jar
          retention-days: 1
