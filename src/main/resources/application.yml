spring:
  application:
    name: autoHealing
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    # .env 파일을 환경변수로 자동 로드합니다 (Spring Boot 2.4+)
    import: optional:file:.env[.properties]

# ──────────────────────────────────────────────
# Jira Cloud 연동 설정
# 실제 값은 .env 파일에서 주입됩니다.
# ──────────────────────────────────────────────
jira:
  host: ${JIRA_HOST}                   # 예: https://your-domain.atlassian.net
  email: ${JIRA_EMAIL}                 # Jira 계정 이메일
  api-token: ${JIRA_API_TOKEN}         # Jira API Token
  project-key: ${JIRA_PROJECT_KEY}     # 프로젝트 키 (예: SCRUM)
  transition:
    in-progress: "In Progress"
    done: "Done"
  issue:
    type: "Task"

# ──────────────────────────────────────────────
# Auto-Healing Feature Toggle
#   manual : Jira 티켓 생성만 수행 (기본값)
#   auto   : 티켓 생성 후 HealingStrategy 자동 실행
# ──────────────────────────────────────────────
auto-healing:
  mode: manual

# ──────────────────────────────────────────────
# Snyk 연동 설정
# SNYK_API_TOKEN 은 .env 파일에 추가하세요:
#   SNYK_API_TOKEN=snyk_xxxxxxxxxxxxx
# Token 없으면 SnykClient가 Mock 데이터를 반환합니다.
# ──────────────────────────────────────────────

# ──────────────────────────────────────────────
# GitHub 및 Jira 상태 변이 설정 (하드코딩 제거 분리)
# ──────────────────────────────────────────────
github:
  pr:
    # PR 생성 시 타이틀 접두사 및 레이블 관련 설명
    title-prefix: "[Auto-Healing]"
    commit-prefix: "fix: "
    commit-suffix: " by AI"
    merge-message: "Merged by Auto-Healing System"

# ──────────────────────────────────────────────
# Discord Webhook 설정
# ──────────────────────────────────────────────
discord:
  webhook-url: ${DISCORD_WEBHOOK_URL}