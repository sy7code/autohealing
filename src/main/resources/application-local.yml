server:
  port: 8080

spring:
  datasource:
    # 로컬 테스트용 DB 설정 (Local PostgreSQL)
    url: ${LOCAL_DB_URL:jdbc:postgresql://localhost:5432/autohealing}
    username: ${LOCAL_DB_USERNAME:postgres}
    password: ${LOCAL_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.dialect]": org.hibernate.dialect.PostgreSQLDialect
